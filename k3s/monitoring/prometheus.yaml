apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: zenxbattle
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
    - job_name: api-gateway
      static_configs:
      - targets: ["api-gateway:7000"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: zenxbattle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: zenxbattle
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
