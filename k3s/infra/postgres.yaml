apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: xcode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: admin
        - name: POSTGRES_DB
          value: xcode
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: xcode-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: xcode
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
