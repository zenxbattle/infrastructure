apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: zenxbattle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: lijuthomas/api-gateway:amd64
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7000
        envFrom:
        - configMapRef:
            name: zenxbattle-config
        - secretRef:
            name: zenxbattle-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: zenxbattle
spec:
  selector:
    app: api-gateway
  ports:
  - port: 7000
    targetPort: 7000
