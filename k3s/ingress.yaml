apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xcode-ingress
  namespace: xcode
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: xcode.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 7000
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: prometheus
            port:
              number: 9090
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xcode-ws
  namespace: xcode
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: xcode.local
    http:
      paths:
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: challenge-manager
            port:
              number: 7777
